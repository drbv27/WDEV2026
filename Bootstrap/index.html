<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
    <title>Document</title>
</head>
<body>
    <div class="container mt-4">
        <!--header-->
        <div class="row mb-3">
            <div class="col-12">
                <div class="bg-primary text-white p-4 rounded text-center">
                    <h1>Mi sitio web</h1>
                </div>
            </div>
        </div>
        <!--Contenido + sidebar-->
        <div class="row">
            <div class="col-12 col-md-8 mb-3 mb-md-0">
                <div class="bg-light p-4 rounded h-100">
                <h2>Contenido Principal</h2>
                <p>Este es el area del contenido. En movil 
                    ocupa todo el ancho, en tablet y desktop
                    ocupa 2/3 o 66.666%
                </p>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="bg-dark text-white p-4 rounded h-100">
                    <h3>Sidebar</h3>
                    <p>Informacion lateral</p>
                </div>
            </div>
        </div>
        <!--3 tarjetas-->
        <div class="row mt-3">
            <div class="col-12 col-sm-6 col-lg-4 mb-3">
                <div class="bg-success text-white p-4 rounded text-center">
                    Tarjeta 1
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 mb-3">
                <div class="bg-warning text-white p-4 rounded text-center">
                    Tarjeta 2
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 mb-3">
                <div class="bg-danger text-white p-4 rounded text-center">
                    Tarjeta 3
                </div>
            </div>
        </div>
    </div>

    <!--Bootstrap JS para interacciones siempre va a aqui al final-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
