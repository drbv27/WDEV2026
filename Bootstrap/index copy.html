<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
    <title>Document</title>
</head>
<body>
    <h1 class="text-center text-primary mt-5">Hola Bootstrap</h1>



    
    <!--Grid base de Bootstrap-->
    <div class="container">
        <div class="row">
            <div class="col">Columna1</div>
            <div class="col">Columna2</div>
            <div class="col">Columna3</div>
        </div>
<!--         <div class="row">
            <div class="col">ColumnaA</div>
            <div class="col">ColumnaB</div>
            <div class="col">ColumnaC</div>
            <div class="col">ColumnaD</div>
        </div> -->

        <div class="row">
            <div class="col-8 border">Ocupa 8 de 12 columnas internas</div>
            <div class="col-4 border">Ocupa 4 de 12 columnas internas</div>
        </div>

        <div class="row">
            <div class="col-6 border">50%</div>
            <div class="col-6 border">50%</div>
        </div>

        <div class="row">
            <div class="col-3 border">Sidebar 25%</div>
            <div class="col-9 border">Contenido 75%</div>
        </div>

        <!--4 columnas iguales de 25%-->
        <div class="row">
            <div class="col-3">25%</div>
            <div class="col-3">25%</div>
            <div class="col-3">25%</div>
            <div class="col-3">25%</div>
        </div>
    </div>
    <!--
    Extra small    col-       <576px (default)
    small          col-sm-    >=576px
    medium         col-md-    >=768px
    large          col-lg-    >=992px
    extra large    col-xl-    >=1200px
    -->
    <hr>
    <div class="container">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-3 border">Tarjeta 1</div>
            <div class="col-12 col-md-6 col-lg-3 border">Tarjeta 2</div>
            <div class="col-12 col-md-6 col-lg-3 border">Tarjeta 3</div>
            <div class="col-12 col-md-6 col-lg-3 border">Tarjeta 4</div>
        </div>
    </div>



    <!--Bootstrap JS para interacciones siempre va a aqui al final-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
