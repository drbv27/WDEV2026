<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Document</title>
</head>
<body>
    <div class="contenedor">
        <div class="caja caja-1">Caja 1</div>
        <div class="caja caja-2">Caja 2</div>
        <div class="caja caja-3">Caja 3</div>
    </div>

    <div class="contenedor-abs">
        <div class="caja">Caja Normal</div>
        <div class="caja caja-absoluta">Soy Absolute</div>
        <div class="caja">Otra caja normal</div>
    </div>

    <div class="icono-con-badge">
        <div class="icono-notif">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
        </div>
        <span class="badge-num">3</span>
    </div>
    <div class="elconte">
        <div class="elemento">
            X
        </div>
    </div>

    <div class="card-abs">
        <span class="card-badge">NUEVO</span>
        <img src="https://picsum.photos/400/200?random=1" alt="Producto">
        <div class="card-body">
            <h3>Audifonos Premium</h3>
            <p>Cancelacion de ruido activa</p>
            <span class="card-price">$89.000</span>
        </div>
        <button class="card-fav">♥</button>
    </div>
    
</body>
</html>
